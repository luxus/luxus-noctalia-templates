    inactiveBorderColor:
      - "{{colors.outline.default.hex}}"
    searchingActiveBorderColor:
      - "{{colors.tertiary.default.hex}}"
      - bold
    optionsTextColor:
      - "{{colors.secondary.default.hex}}"
    selectedLineBgColor:
      - "{{colors.surface_container.default.hex}}"
